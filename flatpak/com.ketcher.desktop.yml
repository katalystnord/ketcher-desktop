app-id: com.ketcher.desktop
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: '24.08'
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node24
command: ketcher-desktop
separate-locales: false

finish-args:
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --device=dri
  - --filesystem=xdg-documents
  - --filesystem=xdg-download

modules:
  - name: ketcher-desktop
    buildsystem: simple

    build-options:
      append-path: /usr/lib/sdk/node24/bin
      env:
        XDG_CACHE_HOME: /run/build/ketcher-desktop/cache
        npm_config_cache: /run/build/ketcher-desktop/flatpak-node/npm-cache
        npm_config_offline: 'true'

    build-commands:
      # ── Root dependencies (offline, sources pre-fetched) ─────────────────
      - npm install --offline

      # ── Package with electron-builder (directory mode) ───────────────────
      # ketcher/example/dist/ is pre-built and included as a source — the
      # Ketcher build toolchain uses an npm workspace lockfile structure that
      # flatpak-node-generator cannot fully resolve. The Ketcher git source
      # is declared below for transparency and audit purposes.
      - npx electron-builder --linux dir --publish never

      # ── Install ──────────────────────────────────────────────────────────
      - cp -r dist-electron/linux-unpacked /app/ketcher
      - install -Dm755 flatpak/run.sh /app/bin/ketcher-desktop
      - install -Dm644 flatpak/com.ketcher.desktop.desktop
          /app/share/applications/com.ketcher.desktop.desktop
      - install -Dm644 flatpak/icons/256x256.png
          /app/share/icons/hicolor/256x256/apps/com.ketcher.desktop.png
      - install -Dm644 flatpak/icons/512x512.png
          /app/share/icons/hicolor/512x512/apps/com.ketcher.desktop.png
      - install -Dm644 build/com.ketcher.desktop.metainfo.xml
          /app/share/metainfo/com.ketcher.desktop.metainfo.xml

    sources:
      # ── For local testing: use the working tree directly ─────────────────
      # The working tree already contains ketcher/example/dist/ from a prior
      # build; the Flatpak build-commands skip rebuilding Ketcher.
      # For Flathub submission replace this block with the pinned git sources
      # and ketcher-dist archive below.
      - type: dir
        path: ..

      # ── For Flathub submission: pin to a tagged release ──────────────────
      # 1. Desktop app source
      # - type: git
      #   url: https://github.com/katalystnord/ketcher-desktop
      #   tag: v3.17.0-rc.1
      #   commit: b1d03ec712f58875f66b3a962266cf4d4afa4341
      #
      # 2. Ketcher source (for audit — dist is pre-built, see below)
      # - type: git
      #   url: https://github.com/epam/ketcher
      #   dest: ketcher
      #   commit: 4d25340d33d3b59bb216916f9db067fc69b9ea3f
      #
      # 3. Pre-built Ketcher SPA built from the Ketcher commit above
      # - type: archive
      #   url: https://github.com/katalystnord/ketcher-desktop/releases/download/v3.17.0-rc.1/ketcher-dist.tar.gz
      #   sha256: 0a05a8cb5767dd956cca7c62c27e3f395391faac40d507022eb240858725e2fa
      #   dest: ketcher/example

      # ── Generated npm sources (root package only) ─────────────────────────
      # Produced by: bash scripts/generate-flatpak-sources.sh
      - generated-sources.json
